<section class="personnalise-page">
  <div class="hero-section">
    <div class="hero-overlay">
      <div class="hero-content">
        <h1>Circuit Personnalisé</h1>
        <p>Créez votre voyage sur mesure au Bénin</p>
      </div>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-bar">
      <div class="progress-step" [class.active]="etape >= 1" [class.completed]="etape > 1">
        <span class="step-number">1</span>
        <span class="step-label">Durée</span>
      </div>
      <div class="progress-step" [class.active]="etape >= 2" [class.completed]="etape > 2">
        <span class="step-number">2</span>
        <span class="step-label">Jours</span>
      </div>
      <div class="progress-step" [class.active]="etape >= 3" [class.completed]="etape > 3">
        <span class="step-number">3</span>
        <span class="step-label">Options</span>
      </div>
      <div class="progress-step" [class.active]="etape >= 4" [class.completed]="etape > 4">
        <span class="step-number">4</span>
        <span class="step-label">Résumé</span>
      </div>
      <div class="progress-step" [class.active]="etape >= 5">
        <span class="step-number">5</span>
        <span class="step-label">Contact</span>
      </div>
    </div>
  </div>

  <div class="catalog-notices" *ngIf="catalogNotices.length > 0 && !catalogLoading">
    <p *ngFor="let notice of catalogNotices">{{ notice }}</p>
  </div>

  <app-circuit-step1
    *ngIf="etape === 1"
    [nombreJours]="nombreJours"
    [nombrePersonnes]="nombrePersonnes"
    [catalogLoading]="catalogLoading"
    (nombreJoursChange)="onNombreJoursChange($event)"
    (nombrePersonnesChange)="onNombrePersonnesChange($event)"
    (next)="etape = 2">
  </app-circuit-step1>

  <app-circuit-step2
    *ngIf="etape === 2"
    [jours]="jours"
    [zones]="zones"
    [villes]="villes"
    [activites]="activites"
    [catalogLoading]="catalogLoading"
    [tarifsOptions]="tarifsOptions"
    (joursChange)="onJoursChange($event)"
    (prev)="etape = 1"
    (next)="etape = 3">
  </app-circuit-step2>

  <app-circuit-step3
    *ngIf="etape === 3"
    [hebergements]="hebergements"
    [tarifsOptions]="tarifsOptions"
    [nombrePersonnes]="nombrePersonnes"
    [nombreJours]="nombreJours"
    [initialOptions]="options"
    [initialHebergementState]="hebergementState"
    (optionsChange)="onOptionsChange($event)"
    (hebergementStateChange)="onHebergementStateChange($event)"
    (prev)="etape = 2"
    (next)="etape = 4">
  </app-circuit-step3>

  <app-circuit-step4
    *ngIf="etape === 4"
    [jours]="jours"
    [activites]="activites"
    [hebergements]="hebergements"
    [options]="options"
    [hebergementState]="hebergementState"
    [tarifsOptions]="tarifsOptions"
    [nombreJours]="nombreJours"
    [nombrePersonnes]="nombrePersonnes"
    (prev)="etape = 3"
    (next)="etape = 5">
  </app-circuit-step4>

  <app-circuit-step5
    *ngIf="etape === 5"
    [contact]="contact"
    [isSubmitting]="isSubmitting"
    [submitSuccess]="submitSuccess"
    [submitError]="submitError"
    [submitErrorMessage]="submitErrorMessage"
    (contactChange)="onContactChange($event)"
    (prev)="etape = 4"
    (formSubmit)="onSubmit()"
    (goHome)="goHome()">
  </app-circuit-step5>
</section>
