<div class="villes-admin">
  <app-header mode="compact"></app-header>

  <main class="page-content">
    <app-admin-actions-bar title="Gestion des villes" icon="ri-building-4-line">
      <div bar-right class="actions-right">
        <div class="search-field">
          <i class="ri-search-line"></i>
          <input
            type="text"
            [(ngModel)]="searchTerm"
            placeholder="Rechercher une ville..."
            aria-label="Rechercher une ville"
          />
        </div>
        <div class="sort-field">
          <i class="ri-filter-3-line"></i>
          <select [(ngModel)]="sortOption" aria-label="Trier les villes">
            <option value="nom-asc">Nom A → Z</option>
            <option value="nom-desc">Nom Z → A</option>
            <option value="zone-asc">Zone A → Z</option>
            <option value="id-desc">Plus récentes</option>
            <option value="id-asc">Plus anciennes</option>
          </select>
        </div>
        <be-button
          variant="primary"
          iconLeft="ri-add-line"
          label="Ajouter une ville"
          (click)="openAddModal()">
        </be-button>
      </div>
    </app-admin-actions-bar>

    <div class="table-meta" *ngIf="!loading">
      {{ filteredVilles.length }} ville{{ filteredVilles.length > 1 ? 's' : '' }}
    </div>

    <div class="load-error" *ngIf="!loading && loadError">
      <i class="ri-error-warning-line"></i>
      <span>{{ loadError }}</span>
    </div>

    <div class="table-card">
      <app-data-table
        [columns]="tableColumns"
        [data]="filteredVilles"
        [loading]="loading"
        [actions]="tableActions"
        (actionClick)="onTableAction($event)"
        (rowClick)="onRowClick($event)">
      </app-data-table>
    </div>

    <div class="empty-state" *ngIf="!loading && !loadError && filteredVilles.length === 0">
      <div class="empty-icon">
        <i class="ri-building-4-line"></i>
      </div>
      <h2>Aucune ville trouvée</h2>
      <p>
        Essaie un autre mot-clé ou ajoute une nouvelle ville.
      </p>
      <button class="btn-add ghost" (click)="openAddModal()">
        <i class="ri-add-line"></i>
        Ajouter une ville
      </button>
    </div>
  </main>
</div>

<!-- Modal pour ajouter/modifier (réutilise app-modal) -->
<app-modal [title]="isEditing ? 'Modifier la ville' : 'Ajouter une ville'" [open]="showModal" (close)="closeModal()">
  <form (ngSubmit)="saveVille()" #villeForm="ngForm">
    <div class="form-error" *ngIf="formError">
      <i class="ri-error-warning-line"></i>
      {{ formError }}
    </div>

    <div class="form-group">
      <label for="nom">Nom de la ville *</label>
      <input
        type="text"
        id="nom"
        name="nom"
        [(ngModel)]="currentVille.nom"
        required
        placeholder="Ex: Cotonou, Ouidah, Abomey"
      />
    </div>

    <div class="form-group">
      <label for="zoneId">Zone *</label>
      <select
        id="zoneId"
        name="zoneId"
        [(ngModel)]="currentVille.zoneId"
        required
      >
        <option value="">Sélectionner une zone</option>
        <option *ngFor="let zone of zones" [value]="zone.idZone">{{ zone.nom }}</option>
      </select>
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="closeModal()">Annuler</button>
      <button type="submit" class="btn-primary" [disabled]="!villeForm.valid || saving">
        {{ saving ? (isEditing ? 'Modification...' : 'Ajout...') : (isEditing ? 'Modifier' : 'Ajouter') }}
      </button>
    
<app-modal title="Supprimer la ville" [open]="confirmDeleteOpen" [closeOnBackdrop]="false" size="small" (close)="confirmDeleteOpen = false">
  <p>Êtes-vous sûr de vouloir supprimer cette ville ? Cette action est irréversible.</p>
  <div class="d-flex gap-2 justify-content-end mt-3">
    <be-button variant="secondary" label="Annuler" (click)="confirmDeleteOpen = false"></be-button>
    <be-button variant="danger" label="Supprimer" (click)="executeDelete()"></be-button>
  </div>
</app-modal>
</div>
  </form>
</app-modal>
