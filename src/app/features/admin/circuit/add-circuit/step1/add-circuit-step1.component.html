<div class="form-grid">
  <div class="form-group full-width">
    <label>Titre du circuit *</label>
    <input type="text" [(ngModel)]="circuit.titre" name="titre"
      placeholder="Ex: Découverte du patrimoine royal"
      [class.error]="errors['titre']">
    <span class="error-text" *ngIf="errors['titre']">{{ errors['titre'] }}</span>
  </div>

  <div class="form-group full-width">
    <label>Description *</label>
    <textarea [(ngModel)]="circuit.description" name="description" rows="4"
      placeholder="Décrivez le circuit de manière détaillée..."
      [class.error]="errors['description']"></textarea>
    <span class="error-text" *ngIf="errors['description']">{{ errors['description'] }}</span>
  </div>

  <div class="form-group">
    <label>Durée (jours) *</label>
    <input type="number" [(ngModel)]="circuit.dureeJours" name="duree"
      min="1" max="30" (ngModelChange)="onDureeChange()"
      [class.error]="errors['duree']">
    <span class="error-text" *ngIf="errors['duree']">{{ errors['duree'] }}</span>
  </div>

  <div class="form-group">
    <label>Prix *</label>
    <div class="price-row">
      <input type="number" [(ngModel)]="circuit.prixEuros" name="prix"
        min="0" step="10" placeholder="0"
        [class.error]="errors['prix']">
      <select class="currency-select" [(ngModel)]="priceCurrency" name="priceCurrency"
        (ngModelChange)="onPriceCurrencyChange($event)">
        <option value="EUR">EUR</option>
        <option value="XOF">XOF (FCFA)</option>
      </select>
    </div>
    <span class="hint" *ngIf="getPriceConversionLabel()">{{ getPriceConversionLabel() }}</span>
    <span class="error-text" *ngIf="errors['prix']">{{ errors['prix'] }}</span>
  </div>
</div>
