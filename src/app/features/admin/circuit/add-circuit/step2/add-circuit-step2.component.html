<div class="media-section">
  <div class="form-group">
    <label>Image principale *</label>
    <div class="file-upload-area" [class.has-file]="previewHero">
      <input type="file" accept="image/*" (change)="onHeroSelect($event)" #heroInput>
      <div class="upload-placeholder" *ngIf="!previewHero" (click)="heroInput.click()">
        <span class="upload-icon">📷</span>
        <span>Cliquez pour sélectionner l'image</span>
      </div>
      <img *ngIf="previewHero" [src]="previewHero" alt="Aperçu" class="preview-image">
    </div>
    <span class="error-text" *ngIf="errors['hero']">{{ errors['hero'] }}</span>
  </div>

  <div class="form-group full-width">
    <label>Galerie (3-10 images) *</label>
    <div class="file-upload-area">
      <input type="file" accept="image/*" multiple (change)="onGalerieSelect($event)" #galerieInput>
      <div class="upload-placeholder" (click)="galerieInput.click()">
        <span class="upload-icon">🖼️</span>
        <span>Sélectionnez entre 3 et 10 images</span>
      </div>
    </div>
    <div class="preview-grid" *ngIf="previewsGalerie.length > 0">
      <img *ngFor="let preview of previewsGalerie" [src]="preview" alt="Aperçu" class="preview-thumb">
    </div>
    <span class="hint" *ngIf="circuit.imagesGalerie.length > 0">
      {{ circuit.imagesGalerie.length }} image(s) sélectionnée(s)
    </span>
    <span class="error-text" *ngIf="errors['galerie']">{{ errors['galerie'] }}</span>
  </div>
</div>
