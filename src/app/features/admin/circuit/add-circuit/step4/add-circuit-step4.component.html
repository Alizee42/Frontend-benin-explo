<div class="error-banner" *ngIf="errors['inclus'] || errors['nonInclus']">
  <div class="error-title">Champs manquants :</div>
  <ul class="error-list">
    <li *ngFor="let item of getStep4MissingSummary()">{{ item }}</li>
  </ul>
</div>

<div class="step3-tabs" role="tablist" aria-label="Sections etape 4">
  <button type="button" class="step3-tab" [class.open]="step4Section === 'highlights'" (click)="setStep4Section('highlights')">Points forts</button>
  <button type="button" class="step3-tab" [class.open]="step4Section === 'inclusions'" (click)="setStep4Section('inclusions')">Inclus / Non inclus</button>
</div>

<div class="step3-panel" *ngIf="step4Section === 'highlights'">
  <div class="section highlights-section">
    <h3>Points forts du circuit</h3>
    <div class="predefined-points">
      <h4>Ajouter un point fort predefini</h4>
      <div class="predefined-grid">
        <button type="button" class="btn-predefined" *ngFor="let point of predefinedPointsForts"
          (click)="addPredefinedPointFort(point)" [disabled]="circuit.pointsForts.length >= 5">
          <span class="point-icon">{{ point.icon }}</span>
          <span class="point-title">{{ point.title }}</span>
        </button>
      </div>
    </div>
    <div class="highlights-grid">
      <div class="highlight-card" *ngFor="let point of circuit.pointsForts; let i = index; trackBy: trackByIndex">
        <div class="point-header">
          <span class="point-number">Point fort {{ i + 1 }}</span>
          <button type="button" class="btn-remove" (click)="removePointFort(i)" *ngIf="circuit.pointsForts.length > 1" title="Supprimer">×</button>
        </div>
        <div class="point-form">
          <div class="form-row">
            <label>Icone *</label>
            <select [(ngModel)]="circuit.pointsForts[i].icon" [name]="'point-icon-' + i" class="icon-select">
              <option value="">Choisir une icone</option>
              <option value="🏛️">Histoire & Culture</option>
              <option value="🌿">Nature & Ecologie</option>
              <option value="🍲">Gastronomie</option>
              <option value="🏖️">Plages & Detente</option>
              <option value="🏞️">Paysages</option>
              <option value="🎭">Traditions</option>
              <option value="🎨">Artisanat</option>
              <option value="🏊‍♂️">Activites aquatiques</option>
              <option value="📸">Photographie</option>
              <option value="👥">Rencontres humaines</option>
            </select>
          </div>
          <div class="form-row">
            <label>Titre *</label>
            <input type="text" [(ngModel)]="circuit.pointsForts[i].title" [name]="'point-title-' + i" placeholder="Titre du point fort" class="title-input">
          </div>
          <div class="form-row">
            <label>Description *</label>
            <textarea [(ngModel)]="circuit.pointsForts[i].desc" [name]="'point-desc-' + i" placeholder="Description detaillee du point fort" rows="2" class="desc-input"></textarea>
          </div>
        </div>
      </div>
      <button type="button" class="btn-add-highlight" (click)="addPointFort()" *ngIf="circuit.pointsForts.length < 5">
        <span class="add-icon">+</span>
        <span>Creer un point fort personnalise</span>
      </button>
    </div>
  </div>
</div>

<div class="step3-panel" *ngIf="step4Section === 'inclusions'">
  <div class="section inclusions-section">
    <div class="inclusions-grid">
      <div class="inclusion-card included">
        <div class="inclusion-header">
          <div class="inclusion-icon">+</div>
          <h4>Inclus dans le prix</h4>
        </div>
        <div class="inclusion-list">
          <div class="inclusion-item" *ngFor="let item of circuit.inclus; let i = index; trackBy: trackByIndex">
            <span class="item-bullet"></span>
            <input type="text" [(ngModel)]="circuit.inclus[i]" [name]="'inclus-' + i" placeholder="Ex: Guide francophone" class="item-input">
            <button type="button" class="btn-remove-small" (click)="removeInclus(i)" *ngIf="circuit.inclus.length > 1" title="Supprimer">×</button>
          </div>
          <button type="button" class="btn-add-small" (click)="addInclus()">
            <span class="add-icon-small">+</span><span>Ajouter</span>
          </button>
          <span class="error-text" *ngIf="errors['inclus']">{{ errors['inclus'] }}</span>
        </div>
      </div>
      <div class="inclusion-card not-included">
        <div class="inclusion-header">
          <div class="inclusion-icon">-</div>
          <h4>Non inclus</h4>
        </div>
        <div class="inclusion-list">
          <div class="inclusion-item" *ngFor="let item of circuit.nonInclus; let i = index; trackBy: trackByIndex">
            <span class="item-bullet"></span>
            <input type="text" [(ngModel)]="circuit.nonInclus[i]" [name]="'noninclus-' + i" placeholder="Ex: Vol international" class="item-input">
            <button type="button" class="btn-remove-small" (click)="removeNonInclus(i)" *ngIf="circuit.nonInclus.length > 1" title="Supprimer">×</button>
          </div>
          <button type="button" class="btn-add-small" (click)="addNonInclus()">
            <span class="add-icon-small">+</span><span>Ajouter</span>
          </button>
          <span class="error-text" *ngIf="errors['nonInclus']">{{ errors['nonInclus'] }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
