<div class="circuits-admin">
  <app-header mode="compact"></app-header>

  <main class="page-content">
    <app-admin-actions-bar title="Gestion des circuits" icon="ri-route-line">
      <be-button
        bar-right
        variant="primary"
        size="md"
        iconLeft="ri-add-line"
        label="Ajouter un circuit"
        (click)="addCircuit()">
      </be-button>
    </app-admin-actions-bar>

    <section class="toolbar-card">
      <div class="toolbar-main">
        <label class="search-box">
          <i class="ri-search-line"></i>
          <input
            type="text"
            [(ngModel)]="searchTerm"
            placeholder="Rechercher un circuit, une ville ou une formule">
        </label>

        <label class="sort-box">
          <span>Trier</span>
          <select [(ngModel)]="sortBy">
            <option value="recent">Plus recents</option>
            <option value="title-asc">Titre A-Z</option>
            <option value="title-desc">Titre Z-A</option>
            <option value="price-asc">Prix croissant</option>
            <option value="price-desc">Prix decroissant</option>
          </select>
        </label>
      </div>

      <div class="toolbar-meta">
        <span>{{ filteredCircuits.length }} circuit{{ filteredCircuits.length > 1 ? 's' : '' }}</span>
      </div>
    </section>

    <div *ngIf="loadError" class="page-alert warning">
      <i class="ri-error-warning-line"></i>
      <span>{{ loadError }}</span>
    </div>

    <div *ngIf="actionError" class="page-alert danger">
      <i class="ri-close-circle-line"></i>
      <span>{{ actionError }}</span>
    </div>

    <app-data-table
      [columns]="tableColumns"
      [data]="filteredCircuits"
      [loading]="loading"
      [actions]="tableActions"
      [rowClickable]="true"
      [emptyMessage]="searchTerm ? 'Aucun circuit ne correspond a cette recherche.' : 'Aucun circuit disponible.'"
      (actionClick)="onTableAction($event)"
      (rowClick)="onRowClick($event)">
    </app-data-table>
  </main>

<app-modal title="Supprimer le circuit" [open]="confirmDeleteOpen" [closeOnBackdrop]="false" size="small" (close)="confirmDeleteOpen = false">
  <p>Êtes-vous sûr de vouloir supprimer ce circuit ? Cette action est irréversible.</p>
  <div class="d-flex gap-2 justify-content-end mt-3">
    <button type="button" class="btn btn-secondary btn-sm" (click)="confirmDeleteOpen = false">Annuler</button>
    <button type="button" class="btn btn-danger btn-sm" (click)="executeDelete()">Supprimer</button>
  </div>
</app-modal>
</div>
