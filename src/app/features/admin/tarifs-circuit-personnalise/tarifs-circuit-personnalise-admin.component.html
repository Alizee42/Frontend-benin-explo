<div class="circuits-admin tarifs-circuit-personnalise-admin">
  <app-header mode="compact"></app-header>

  <main class="page-content">
    <app-admin-actions-bar
      title="Tarifs du circuit personnalise"
      icon="ri-money-euro-circle-line"
      subtitle="Ces montants alimentent le devis public pour le transport, le guide, le chauffeur et la pension complete.">
      <div bar-right class="actions-right">
        <a routerLink="/admin/dashboard" class="action-link">Retour au dashboard</a>
      </div>
    </app-admin-actions-bar>

    <section class="table-panel">
      <div *ngIf="isLoading" class="state-card">
        Chargement des tarifs...
      </div>

      <form *ngIf="!isLoading" (ngSubmit)="saveTarifs()">
        <div class="form-grid">
          <article class="section-card">
            <h2>Transport</h2>
            <p class="section-hint">Montants appliques par jour selon le vehicule selectionne.</p>

            <div class="field-grid">
              <label class="field">
                <span>Voiture compacte</span>
                <input type="number" min="0" step="0.01" [(ngModel)]="tarifs.transportCompactParJour" name="transportCompactParJour">
              </label>

              <label class="field">
                <span>Voiture familiale</span>
                <input type="number" min="0" step="0.01" [(ngModel)]="tarifs.transportFamilialParJour" name="transportFamilialParJour">
              </label>

              <label class="field">
                <span>Minibus</span>
                <input type="number" min="0" step="0.01" [(ngModel)]="tarifs.transportMinibusParJour" name="transportMinibusParJour">
              </label>

              <label class="field">
                <span>Bus touristique</span>
                <input type="number" min="0" step="0.01" [(ngModel)]="tarifs.transportBusParJour" name="transportBusParJour">
              </label>
            </div>
          </article>

          <article class="section-card">
            <h2>Services complementaires</h2>
            <p class="section-hint">Ces tarifs sont repris directement dans le devis estime du parcours public.</p>

            <div class="field-grid">
              <label class="field">
                <span>Guide par jour</span>
                <input type="number" min="0" step="0.01" [(ngModel)]="tarifs.guideParJour" name="guideParJour">
              </label>

              <label class="field">
                <span>Chauffeur par jour</span>
                <input type="number" min="0" step="0.01" [(ngModel)]="tarifs.chauffeurParJour" name="chauffeurParJour">
              </label>

              <label class="field">
                <span>Pension complete par personne / jour</span>
                <input type="number" min="0" step="0.01" [(ngModel)]="tarifs.pensionCompleteParPersonneParJour" name="pensionCompleteParPersonneParJour">
              </label>

              <label class="field">
                <span>Devise</span>
                <input type="text" maxlength="10" [(ngModel)]="tarifs.devise" name="devise">
              </label>
            </div>
          </article>
        </div>

        <p *ngIf="successMessage" class="feedback success">{{ successMessage }}</p>
        <div *ngIf="errorMessage" class="form-error">{{ errorMessage }}</div>

        <div class="actions">
          <button type="button" class="btn-secondary" (click)="loadTarifs()" [disabled]="isSaving">Recharger</button>
          <button type="submit" class="btn-primary" [disabled]="isSaving">
            {{ isSaving ? 'Enregistrement...' : 'Enregistrer les tarifs' }}
          </button>
        </div>
      </form>
    </section>
  </main>
</div>
