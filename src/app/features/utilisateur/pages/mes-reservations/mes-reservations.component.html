<div class="mes-reservations-page">
  <div class="page-hero">
    <h1><i class="ri-calendar-check-2-line"></i> Mes reservations</h1>
    <p>Retrouvez toutes vos reservations liees a votre compte Benin Explo.</p>
  </div>

  <div class="page-body">

    <div class="search-error" *ngIf="errorMessage">
      <i class="ri-error-warning-line"></i> {{ errorMessage }}
    </div>

    <div *ngIf="loaded">

      <!-- Etat vide -->
      <div class="empty-state" *ngIf="!loading && totalReservations === 0">
        <i class="ri-inbox-2-line"></i>
        <p>Aucune reservation trouvee pour ce compte.</p>
        <small>Vos futures reservations apparaitront ici automatiquement.</small>
      </div>

      <div *ngIf="totalReservations > 0">

        <!-- Onglets -->
        <div class="tabs">
          <button class="tab-btn" [class.active]="activeTab === 'hebergements'" (click)="setTab('hebergements')">
            <i class="ri-hotel-bed-line"></i> Hebergements
            <span class="tab-count">{{ hebergementReservations.length }}</span>
          </button>
          <button class="tab-btn" [class.active]="activeTab === 'circuits'" (click)="setTab('circuits')">
            <i class="ri-route-line"></i> Circuits
            <span class="tab-count">{{ circuitReservations.length }}</span>
          </button>
        </div>

        <!-- Filtre statut -->
        <div class="filter-bar">
          <select class="filter-select" [(ngModel)]="statusFilter">
            <option value="">Tous les statuts</option>
            <option value="EN_ATTENTE">En attente</option>
            <option value="CONFIRMEE">Confirmee</option>
            <option value="TERMINEE">Terminee</option>
            <option value="ANNULEE">Annulee</option>
          </select>
          <span class="filter-count">{{ currentCount }} resultat{{ currentCount > 1 ? 's' : '' }}</span>
        </div>

        <!-- Tableau hebergements -->
        <div *ngIf="activeTab === 'hebergements'">
          <app-data-table
            [data]="filteredHebergements"
            [columns]="hebergementColumns"
            [loading]="loading"
            [actions]="hebergementActions"
            [iconOnlyActions]="false"
            [autoPaginate]="true"
            [autoPaginateThreshold]="5"
            [pageSize]="8"
            (actionClick)="onTableAction($event)"
            emptyMessage="Aucune reservation d'hebergement">
          </app-data-table>
        </div>

        <!-- Tableau circuits -->
        <div *ngIf="activeTab === 'circuits'">
          <app-data-table
            [data]="filteredCircuits"
            [columns]="circuitColumns"
            [loading]="loading"
            [autoPaginate]="true"
            [autoPaginateThreshold]="5"
            [pageSize]="8"
            emptyMessage="Aucune reservation de circuit">
          </app-data-table>
        </div>

      </div>
    </div>
  </div>
</div>
