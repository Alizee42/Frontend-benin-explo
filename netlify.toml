[build]
  command = "npm run build -- --configuration production"
  publish = "dist/frontend-benin-explo/browser"

[[redirects]]
  from = "/api/*"
  to = "http://217.160.69.180:8081/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/auth/*"
  to = "http://217.160.69.180:8081/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "http://217.160.69.180:8081/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
